name: Infraestructura Cloud II

on:
  workflow_dispatch:   # ejecución manual desde Actions
  push:
    branches:
      - main           # también se ejecuta en cada push a main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout cliente
        uses: actions/checkout@v4

      - name: Checkout proveedor
        uses: actions/checkout@v4
        with:
          repository: VICENTE0777/proveedor-prueba
          path: infra

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Inicializar Terraform
        run: terraform -chdir=infra init

      - name: Aplicar infraestructura
        run: terraform -chdir=infra apply -auto-approve

      - name: Mostrar outputs de Terraform
        run: terraform -chdir=infra output
